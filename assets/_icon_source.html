<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;}
  .icon{
    width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(145deg,#e24a4a 0%,#c0392b 100%);
  }
  .bubble{
    width:62%;height:62%;
    background:#ffffff;
    border-radius:26% 26% 26% 8%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 18px rgba(0,0,0,.18);
  }
  .bubble span{
    color:#c0392b;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    font-weight:700;
    font-size:42vw;
    line-height:1;
    margin-top:-2vw;
  }
</style></head>
<body>
  <div class="icon"><div class="bubble"><span>中</span></div></div>
</body></html>
